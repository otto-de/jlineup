buildscript {
    ext {
        springBootVersion = '4.0.6'
        seleniumVersion = '4.44.0'
        nettyVersion = '4.2.13.Final'
        graalvmVersion = '25.0.3'
        picoCliVersion = '4.7.7'
        awsSdkVersion = '2.46.4'
        awsCdkVersion = '2.258.0'
    }

    repositories {
        mavenCentral()
        maven { url = "https://repo.spring.io/snapshot" }
        maven { url = "https://repo.spring.io/milestone" }
    }
    dependencies {
        classpath("org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}")
        classpath("org.owasp:dependency-check-gradle:12.2.0")
    }
}

plugins {
    id "com.gradleup.shadow" version "9.4.2"
    id 'org.jreleaser' version '1.24.0'
}

//
//\
///\
////\
def jlineup_version = "6.0.2-SNAPSHOT"
/////
////
///
//

repositories {
    mavenCentral()
    mavenLocal()
}

apply plugin: 'java'
apply plugin: 'org.owasp.dependencycheck'
apply plugin: 'io.spring.dependency-management'

ext['selenium.version'] = "${seleniumVersion}"
ext['netty.version'] = "${nettyVersion}"

group = 'de.otto'
version = jlineup_version

jreleaser {
    project {
        snapshot {
            fullChangelog = true
        }
    }
    gitRootSearch = true
    signing {
        active = 'ALWAYS'
        armored = true
    }
    deploy {
        maven {
            github {
                app {
                    snapshotSupported = true
                    active = 'ALWAYS'
                    url = "https://maven.pkg.github.com/otto-de/jlineup"
                    stagingRepository('build/staging-deploy')
                }
            }
            mavenCentral {
                app {
                    snapshotSupported = false
                    active = 'ALWAYS'
                    url = 'https://central.sonatype.com/api/v1/publisher'
                    stagingRepository('build/staging-deploy')

                    connectTimeout = 100
                    readTimeout = 300

                    // Time to wait between state transition checks, in seconds.
                    // Defaults to `10`.
                    //
                    retryDelay = 10

                    // Maximum number of attempts to verify state transition.
                    // Defaults to `60`.
                    // Maven Central release can currently take up to 60 minutes, so we increased this to 360
                    //
                    maxRetries = 360
                }
            }
        }
    }
}

dependencyCheck {
    nvd {
        apiKey = System.getenv("NVD_API_KEY")
    }
    failBuildOnCVSS = 4
    suppressionFiles = ["${rootDir}/dependency-check-suppressions.xml"]
}

subprojects {
    version = jlineup_version
    group = 'de.otto'

    // Tomcat is not used anywhere – Jetty is the embedded server.
    // This global exclude removes Tomcat from the dependency graph entirely,
    // which also suppresses false-positive Dependabot security alerts.
    configurations.all {
        exclude group: 'org.apache.tomcat.embed'
        exclude group: 'org.springframework.boot', module: 'spring-boot-starter-tomcat'
        exclude group: 'org.springframework.boot', module: 'spring-boot-starter-tomcat-runtime'
        exclude group: 'org.springframework.boot', module: 'spring-boot-tomcat'
    }

    repositories {
        mavenLocal()
        mavenCentral()
        maven {
            name = "otto-de-packages"
            url = uri("https://maven.pkg.github.com/otto-de/edison-microservice")
            credentials {
                username = findProperty("github_username")  ?: System.getenv("FKT_GITHUB_USER") ?: System.getenv("GITHUB_USERNAME")
                password = findProperty("github_token") ?: System.getenv("FKT_GITHUB_TOKEN") ?: System.getenv("GITHUB_TOKEN")
            }

        }
    }

    task allDeps(type: DependencyReportTask) {}

    apply plugin: 'application'
    apply plugin: 'maven-publish'
    apply plugin: 'project-report'
    apply plugin: 'org.springframework.boot'
    apply plugin: 'io.spring.dependency-management'
    apply plugin: 'idea'

    tasks.distZip.enabled = false
    tasks.distTar.enabled = false

    tasks.bootDistZip {
        archiveBaseName = project.name
    }

    tasks.bootDistTar {
        archiveBaseName = project.name
    }

    if (project.name != 'jlineup-core') {
        bootJar {
            enabled = true
            //launchScript()
        }

        jar {
            enabled = true
        }

        configurations {
            [apiElements, runtimeElements].each {
                it.outgoing.artifact(bootJar)
            }
        }
    }

    jar {
        manifest {
            attributes(
                    provider: 'gradle',
                    'Implementation-Vendor': project.group,
                    'Implementation-Title': project.name,
                    'Implementation-Version': project.version
            )
        }
    }

    java {
        withJavadocJar()
        withSourcesJar()
    }

    test {
        useJUnitPlatform()
        // To allow monitoring System.Exit() we need to allow security manager so it can be overridden in tests
        systemProperty("java.security.manager", "allow")
        testLogging {
            exceptionFormat = 'full'
            showStandardStreams = true
        }
    }

    publishing {
        publications {
            mavenJava(MavenPublication) {
                pom {
                    url = 'https://github.com/otto-de/jlineup'
                    licenses {
                        license {
                            name = 'The Apache License, Version 2.0'
                            url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                        }
                    }
                    developers {
                        developer {
                            id = 'MediaMarco'
                            name = 'Marco Geweke'
                            email = 'marco.geweke@gmail.com'
                        }
                    }
                    scm {
                        connection = 'scm:git:https://github.com/otto-de/jlineup.git'
                        developerConnection = 'scm:git:ssh://github.com/otto-de/jlineup.git'
                        url = 'https://github.com/otto-de/jlineup'
                    }
                }
            }
        }

        repositories {
            maven {
                // Our settingsDirectory is the project root dir.
                // We want to 'publish' to the specified dir to have the artifacts uploaded with JReleaser from that location afterwards.
                url = layout.settingsDirectory.dir('build/staging-deploy')
            }
        }
    }

    compileJava {
        options.compilerArgs.addAll(["-Aproject=${project.group}/${project.name}"])
    }

    java {
        targetCompatibility = JavaVersion.VERSION_17
        sourceCompatibility = JavaVersion.VERSION_17
    }

    project.afterEvaluate {
        tasks.withType(JavaCompile) {
            def version = sourceCompatibility
            project.logger.info("Configuring $name to use --release $version")
            println("Configuring $name to use --release $version")
            options.compilerArgs.addAll(['--release', version])
        }
    }

}

static String runCommand(command) {
    Process proc = command.execute()
    def out = new StringBuffer()
    proc.consumeProcessOutputStream(out)
    proc.consumeProcessErrorStream(out)
    proc.waitFor()
    def errorlevel = proc.exitValue()
    if (errorlevel != 0) {
        throw new RuntimeException("exec failed on command: '${command}' with errorlevel ${errorlevel}".toString())
    }
    out.toString().trim()
}
