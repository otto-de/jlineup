# Publishes a release to GitHub Packages and Maven Central using JReleaser.
#
# HOW TO TRIGGER A RELEASE
# -------------------------
# 1. Update `jlineup_version` in build.gradle to a non-SNAPSHOT version (e.g. "6.0.3").
# 2. Add a "## Release <version>" entry at the top of HISTORY.md, e.g.:
#      ## Release 6.0.3 - 2026-07-17
#      * Fix: ...
# 3. Commit and push:
#      git commit -am "chore: prepare release 6.0.3"
#      git push
# 4. Trigger this workflow:
#      gh workflow run release.yml -f version=6.0.3
#    Or use the GitHub Actions UI: Actions → Release → Run workflow.
#
# After a successful release, bump build.gradle to the next SNAPSHOT version:
#      git commit -am "chore: bump to 6.0.4-SNAPSHOT"

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (must match jlineup_version in build.gradle, without -SNAPSHOT)"
        required: true
        type: string

jobs:
  release:
    name: Release ${{ inputs.version }}
    runs-on: ubuntu-24.04

    env:
      DISPLAY: :0
      SE_BROWSER_PATH: /usr/bin/google-chrome
      webdriver.chrome.driver: /usr/bin/chromedriver

    permissions:
      contents: write   # needed to create GitHub releases and push the release tag
      packages: write   # needed to publish to GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0  # JReleaser needs full history to generate changelogs

      - name: Read Chrome version
        run: echo "CHROME_VERSION=$(cat .chrome-version)" >> $GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Validate version matches build.gradle
        run: |
          DECLARED=$(grep 'def jlineup_version' build.gradle | grep -o '"[^"]*"' | tr -d '"')
          if [ "$DECLARED" != "${{ inputs.version }}" ]; then
            echo "ERROR: Input version '${{ inputs.version }}' does not match build.gradle version '$DECLARED'."
            echo "Update build.gradle first, commit, then re-run this workflow."
            exit 1
          fi
          if [[ "$DECLARED" == *-SNAPSHOT ]]; then
            echo "ERROR: build.gradle still contains a SNAPSHOT version: $DECLARED"
            echo "Remove the -SNAPSHOT suffix before releasing."
            exit 1
          fi
          echo "Version check passed: $DECLARED"

      - name: Setup xvfb (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0
          # start xvfb in the background
          sudo /usr/bin/Xvfb $DISPLAY -screen 0 1280x1024x24 &

      - name: Setup Chrome and Chromedriver (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get remove google-chrome-stable chromium -y
          sudo rm -rf /usr/bin/chromedriver
          sudo rm -rf /usr/bin/google-chrome
          echo "Executing: npx @puppeteer/browsers install chrome@$CHROME_VERSION"
          npx @puppeteer/browsers install chrome@$CHROME_VERSION
          echo "Executing: npx @puppeteer/browsers install chromedriver@$CHROME_VERSION"
          npx @puppeteer/browsers install chromedriver@$CHROME_VERSION
          echo "Executing: sudo ln -s /home/runner/work/jlineup/jlineup/chromedriver/linux-$CHROME_VERSION/chromedriver-linux64/chromedriver /usr/bin/chromedriver"
          sudo ln -s /home/runner/work/jlineup/jlineup/chromedriver/linux-$CHROME_VERSION/chromedriver-linux64/chromedriver /usr/bin/chromedriver
          echo "Executing: sudo ln -s /home/runner/work/jlineup/jlineup/chrome/linux-$CHROME_VERSION/chrome-linux64/chrome /usr/bin/google-chrome"
          sudo ln -s /home/runner/work/jlineup/jlineup/chrome/linux-$CHROME_VERSION/chrome-linux64/chrome /usr/bin/google-chrome
          echo "Executing: /usr/bin/google-chrome --version"
          /usr/bin/google-chrome --version
          echo "SE_BROWSER_PATH: '$SE_BROWSER_PATH'"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release notes from HISTORY.md and git history
        run: |
          mkdir -p build
          VERSION="${{ inputs.version }}"

          # 1. Extract the human-written section from HISTORY.md.
          #    Headings use the form "## Release <version>" with an optional " - <date>" suffix.
          #    Grabs everything between the matching heading and the next "## " heading.
          awk "/^## Release ${VERSION}( |$)/{found=1; next} found && /^## /{exit} found{print}" HISTORY.md \
            | sed '/^[[:space:]]*$/d' \
            > build/release-notes.md
          if [ ! -s build/release-notes.md ]; then
            echo "ERROR: No entry found for version '${VERSION}' in HISTORY.md."
            echo "Add a '## Release ${VERSION}' section to HISTORY.md before releasing."
            exit 1
          fi

          # 2. Append the git commit log since the previous release tag.
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -v "^v\?${VERSION}$" \
            | head -1)
          if [ -n "$PREV_TAG" ]; then
            echo "" >> build/release-notes.md
            echo "## Commits since ${PREV_TAG}" >> build/release-notes.md
            git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %h %s" \
              --no-merges \
              >> build/release-notes.md
          fi

          echo "--- release-notes.md ---"
          cat build/release-notes.md

      - name: Set up Node / pnpm (required for frontend build)
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate JReleaser config
        run: ./gradlew jreleaserConfig
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.MAVENCENTRAL_PASSWORD }}

      - name: Run tests and build
        env:
          JLINEUP_TEST_ALL_BROWSERS: 'true'
        run: ./gradlew build installBootDist

      - name: Publish artifacts to staging
        run: ./gradlew publish
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.MAVENCENTRAL_PASSWORD }}

      - name: Full release (GitHub + Maven Central)
        run: ./gradlew jreleaserFullRelease
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.MAVENCENTRAL_PASSWORD }}

      - name: Upload JReleaser output on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-output
          path: |
            build/jreleaser/output.properties
            build/jreleaser/trace.log
