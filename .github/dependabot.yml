version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      codeql-steps:
        patterns:
          - "github/codeql-action*"

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 25
    ignore:
        #Tomcat is excluded; Jetty is used as embedded server. Dependabot is mourning because Tomcat is provided in the Spring Boot BOM, but it is not used in the project.
      - dependency-name: "org.apache.tomcat.embed:*"
    groups:
      test-dependencies:
        patterns:
          - "org.junit.*"
          - "org.mockito.*"
          - "org.hamcrest.*"
      aws-dependencies:
        patterns:
          - "com.amazonaws:*"
          - "software.amazon.awssdk:*"
          - "software.amazon.awssdk.crt:*"
          - "software.amazon.awscdk:*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      jest:
        patterns:
          - "jest"
          - "jest-*"
          - "@jest/*"

  - package-ecosystem: "docker"
    directory: "/web"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/lambda"
    schedule:
      interval: "weekly"
