version: 2

multi-ecosystem-groups:
  aws-dependencies:
    schedule:
      interval: "weekly"
    patterns:
      - "com.amazonaws:*"
      - "software.amazon.awssdk:*"
      - "software.amazon.awssdk.crt:*"
      - "software.amazon.awscdk:*"
      - "aws-cdk"
      - "aws-cdk-*"
      - "@aws-cdk/*"
      - "@aws-sdk/*"
      - "aws-sdk"

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      codeql-steps:
        patterns:
          - "github/codeql-action*"

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 25
    ignore:
        #Tomcat is excluded; Jetty is used as embedded server. Dependabot is mourning because Tomcat is provided in the Spring Boot BOM, but it is not used in the project.
      - dependency-name: "org.apache.tomcat.embed:*"
    multi-ecosystem-groups:
      - "aws-dependencies"
    groups:
      test-dependencies:
        patterns:
          - "org.junit.*"
          - "org.mockito.*"
          - "org.hamcrest.*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    multi-ecosystem-groups:
      - "aws-dependencies"
    groups:
      jest:
        patterns:
          - "jest"
          - "jest-*"
          - "@jest/*"

  - package-ecosystem: "docker"
    directory: "/web"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/lambda"
    schedule:
      interval: "weekly"
