version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 25
    ignore:
      - dependency-name: "org.apache.tomcat.embed:*"
        update-types: [ "version-update:semver-major" ]
    groups:
      test-dependencies:
        patterns:
          - "org.junit.*"
          - "org.mockito.*"
          - "org.hamcrest.*"
      aws-dependencies:
        patterns:
          - "com.amazonaws:*"
          - "software.amazon.awssdk:*"
          - "software.amazon.awssdk.crt:*"
          - "software.amazon.awscdk:*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      jest:
        patterns:
          - "jest"
          - "jest-*"
          - "@jest/*"

  - package-ecosystem: "docker"
    directory: "/web"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/lambda"
    schedule:
      interval: "weekly"
