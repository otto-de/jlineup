jlineup:
  workingDirectory: /tmp/jlineup/
  screenshotsDirectory: report-{id}
  reportDirectory: report-{id}
  maxParallelJobs: 1
  chromeLaunchParameters: --use-spdy=off, --disable-dev-shm-usage
  cleanupProfile: true
  lambda:
    functionNameBase: jlineup-lambda
    # functionNameBase: jlineup-lambda  # if set, derives per-browser names as {base}-chrome-headless, {base}-firefox-headless, etc.
    # functionNameChromeHeadless:       # explicit override for chrome-headless Lambda
    # functionNameFirefoxHeadless:      # explicit override for firefox-headless Lambda
    # functionNameWebkitHeadless:       # explicit override for webkit-headless Lambda

edison:
  application:
    title: JLineup
    favicon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%232563eb'/%3E%3Cstop offset='100%25' stop-color='%231e3a8a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='7' fill='url(%23g)'/%3E%3Ctext x='16' y='22' font-family='ui-monospace%2CSFMono-Regular%2CMonaco%2Cmonospace' font-size='14' font-weight='700' fill='white' text-anchor='middle' letter-spacing='-0.5'%3EJL%3C/text%3E%3C/svg%3E"
    description: Takes screenshots of webpages and checks for differences

management:
  endpoint:
    metrics:
      access: unrestricted
    prometheus:
      access: unrestricted
    loggers:
      access: unrestricted

  endpoints:
    web:
      exposure:
        include: '*'

spring:
  application:
    name: JLineup
  banner:
    location: classpath:banner.txt
  web:
    error:
      whitelabel:
        enabled: false

server:
  servlet:
    context-path: /